<!doctype HTML>
<html>

<head>
    <title>AR Basic</title>
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
</head>

<body>
    <a-scene embedded arjs="detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        <!-- include assets like 3D models and give them an id to use later -->
        <a-assets>
            <a-asset-item id="apple" src="./3D_Models/apple/scene.gltf"></a-asset-item>
            <a-asset-item id="ball" src="./3D_Models/ball/scene.gltf"></a-asset-item>
            <a-asset-item id="cat" src="./3D_Models/cat/scene.gltf"></a-asset-item>
            <a-asset-item id="duck" src="./3D_Models/duck/scene.gltf"></a-asset-item>

        </a-assets>

        <!-- recognise different barcode markers and show digital objects - box/sphere/cylinder/3D-model/image/video/anything -->
        <a-marker type='barcode' value='0'><a-entity position="0 0 0" scale="0.06 0.06 0.06" rotation="0 0 0" animation-mixer gltf-model="#apple"></a-entity></a-marker>
        <a-marker type='barcode' value='1'><a-entity position="0 0 0" scale="18 18 18" rotation="0 0 0" animation-mixer gltf-model="#ball"></a-entity></a-marker>
        <a-marker type='barcode' value='2'><a-entity position="0 0 0" scale="4 4 4" rotation="0 0 0" animation-mixer gltf-model="#cat"></a-entity></a-marker>
        <a-marker type='barcode' value='3'><a-entity position="0 0 0" scale="26 26 26" rotation="0 0 0" animation-mixer gltf-model="#duck"></a-entity></a-marker>

        <!-- add a simple camera -->
        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
